<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>寶可夢中心娃娃</title>
<meta name="description" content="Derek 的寶可夢中心娃娃收藏——皮卡丘限定、蘇打系列與特別款。">
<style>
  :root {
    --bg: #0b0f14; --card: #121822; --border: #1f2937;
    --text: #e6edf3; --muted: #93a1b0; --dim: #8693a1;
    --accent: #ffcb05; --accent2: #4cc2ff;   /* 皮卡丘黃 + 站點藍 */
    --pill: rgba(255,203,5,.14); --pill-border: rgba(255,203,5,.4);
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: "PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
    line-height: 1.6; padding: 2rem 1rem 4rem;
  }
  main { max-width: 1080px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 2.4rem; }
  header h1 { font-size: 1.7rem; }
  header h1 .bolt { color: var(--accent); }
  header p { color: var(--muted); font-size: .9rem; margin-top: .5rem; }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1.3rem;
  }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    overflow: hidden; display: flex; flex-direction: column;
    transition: transform .18s, border-color .18s;
  }
  .card:hover { transform: translateY(-3px); border-color: var(--pill-border); }
  .photo { position: relative; background: #0e141d; }
  .photo img { width: 100%; height: 300px; object-fit: contain; display: block; }
  .num {
    position: absolute; top: .5rem; left: .5rem;
    background: var(--accent); color: #1a1a1a; font-weight: 800; font-size: .8rem;
    width: 1.7rem; height: 1.7rem; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .conf {
    position: absolute; top: .55rem; right: .55rem;
    font-size: .68rem; padding: .1rem .5rem; border-radius: 99px;
    background: rgba(0,0,0,.55); color: var(--dim); border: 1px solid var(--border);
  }
  .body { padding: .9rem 1rem 1.1rem; display: flex; flex-direction: column; gap: .35rem; flex: 1; }
  .name { font-size: 1rem; font-weight: 700; line-height: 1.4; }
  .jp { font-size: .8rem; color: var(--dim); }
  .row { margin-top: .4rem; display: flex; flex-wrap: wrap; gap: .4rem; }
  .pill {
    font-size: .74rem; padding: .12rem .55rem; border-radius: 99px;
    background: var(--pill); color: var(--accent); border: 1px solid var(--pill-border);
  }
  .pill.loc { background: rgba(76,194,255,.12); color: var(--accent2); border-color: rgba(76,194,255,.35); }
  .note { font-size: .8rem; color: var(--muted); margin-top: .3rem; }
  .tabs { display: flex; gap: .6rem; justify-content: center; margin: 1.6rem 0 2rem; flex-wrap: wrap; }
  .tab {
    padding: .5rem 1.2rem; border-radius: 99px; cursor: pointer; font-size: .92rem;
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
    transition: all .15s;
  }
  .tab.active { background: var(--pill); border-color: var(--pill-border); color: var(--accent); font-weight: 700; }
  .tab.soda.active { background: rgba(76,194,255,.14); border-color: rgba(76,194,255,.4); color: var(--accent2); }
  .tab.special.active { background: rgba(255,120,220,.14); border-color: rgba(255,120,220,.4); color: #ff9be0; }
  .panel { display: none; }
  .panel.active { display: block; }
  .panel-intro { text-align: center; color: var(--muted); font-size: .85rem; margin-bottom: 1.6rem; }
  footer { text-align: center; margin-top: 3rem; color: var(--dim); font-size: .78rem; }
  footer a { color: var(--accent2); text-decoration: none; }
</style>
</head>
<body>
<main>
  <header>
    <h1><span class="bolt">⚡</span> 寶可夢中心娃娃</h1>
    <p>Derek 的寶可夢中心娃娃收藏 · 每一隻的系列與限定資訊</p>
  </header>
  <div class="tabs">
    <div class="tab active" data-tab="pika">⚡ 皮卡丘限定（12）</div>
    <div class="tab soda" data-tab="soda">🥤 蘇打系列（5）</div>
    <div class="tab special" data-tab="special">✨ 特別款（1）</div>
  </div>
  <div class="panel active" id="panel-pika">
    <div class="grid" id="grid-pika"></div>
  </div>
  <div class="panel" id="panel-soda">
    <p class="panel-intro">寶可夢中心原創「サイコソーダ・リフレッシュ（SAIKO SODA Refresh）」系列——插畫家 F*Kaori 的蘇打汽水主題,水藍透涼配色+汽水感圓眼。這 5 隻橫跨 3 個不同發售彈次。</p>
    <div class="grid" id="grid-soda"></div>
  </div>
  <div class="panel" id="panel-special">
    <p class="panel-intro">不屬於特定系列的特別款、大型款或親子抱抱款。</p>
    <div class="grid" id="grid-special"></div>
  </div>
  <footer>
    資訊由以圖搜圖+官方資料查證,標較低信心者待實物吊牌確認 ·
    <a href="../">← guides</a>
  </footer>
</main>

 {img:"s4-bulbasaur.jpg", name:"妙蛙種子", jp:"フシギダネ", loc:"寶可夢中心全店＋線上", year:"2024/02 御三家彈", conf:"高",
  note:"薄荷綠版的妙蛙種子,粉紅汽水眼。與傑尼龜、小火龍同彈。"},
 {img:"s5-charmander.jpg", name:"小火龍", jp:"ヒトカゲ", loc:"寶可夢中心全店＋線上", year:"2024/02 御三家彈", conf:"高",
  note:"御三家蘇打彈第三隻。橘身配藍綠汽水眼,反差可愛。"},
 {img:"s1-munchlax.jpg", name:"小卡比獸", jp:"ゴンベ", loc:"寶可夢中心全店＋線上", year:"2025/02 彈", conf:"高",
  note:"最新彈(同彈:六尾、阿羅拉六尾、哥德寶寶、噴嚏熊)。透涼藍綠配色。"},
];
function render(gridId, data, isSoda) {
  const grid = document.getElementById(gridId);
  data.forEach((it, i) => {
    const c = document.createElement("div");
    c.className = "card";
    c.innerHTML = `
      <div class="photo">
        <img src="img/${it.img}" alt="${it.name}" loading="lazy">
        <div class="num">${i+1}</div>
        <div class="conf">信心 ${it.conf}</div>
      </div>
      <div class="body">
        <div class="name">${it.name}</div>
        <div class="jp">${it.jp}</div>
        <div class="row"><span class="pill loc">📍 ${it.loc}</span><span class="pill">🗓 ${it.year}</span></div>
        <div class="note">${it.note}</div>
      </div>`;
    grid.appendChild(c);
  });
}
const special = [
 {img:"x1-dragonite.jpg", name:"快龍＆迷你龍 抱抱娃娃", jp:"だっこぬいぐるみ ミニリュウ＆カイリュー（大器晩成）", loc:"寶可夢中心全店＋線上", year:"2019/10", conf:"高",
  note:"「大器晚成（TAIKI-BANSEI）」系列——主題是越進化越強的寶可夢。大型快龍(約 33cm)懷抱閉眼睡覺的迷你龍。同系列另有由基拉＋班基拉斯、黏黏寶＋黏美龍。定價 ¥3,000。"},
];
render("grid-pika", items, false);
render("grid-soda", soda, true);
render("grid-special", special, false);
const panels = ["pika","soda","special"];
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    const t = tab.dataset.tab;
    document.querySelectorAll(".tab").forEach(x => x.classList.toggle("active", x === tab));
    panels.forEach(p => document.getElementById("panel-"+p).classList.toggle("active", p === t));
  });
});
</script>
</body>
</html>
