<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>皮卡丘限定收藏圖鑑</title>
<meta name="description" content="Derek 的日本限定皮卡丘娃娃收藏——每一隻的限定地點、活動與年份。">
<style>
  :root {
    --bg: #0b0f14; --card: #121822; --border: #1f2937;
    --text: #e6edf3; --muted: #93a1b0; --dim: #8693a1;
    --accent: #ffcb05; --accent2: #4cc2ff;   /* 皮卡丘黃 + 站點藍 */
    --pill: rgba(255,203,5,.14); --pill-border: rgba(255,203,5,.4);
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: "PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
    line-height: 1.6; padding: 2rem 1rem 4rem;
  }
  main { max-width: 1080px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 2.4rem; }
  header h1 { font-size: 1.7rem; }
  header h1 .bolt { color: var(--accent); }
  header p { color: var(--muted); font-size: .9rem; margin-top: .5rem; }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1.3rem;
  }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    overflow: hidden; display: flex; flex-direction: column;
    transition: transform .18s, border-color .18s;
  }
  .card:hover { transform: translateY(-3px); border-color: var(--pill-border); }
  .photo { position: relative; background: #0e141d; }
  .photo img { width: 100%; height: 260px; object-fit: cover; display: block; }
  .num {
    position: absolute; top: .5rem; left: .5rem;
    background: var(--accent); color: #1a1a1a; font-weight: 800; font-size: .8rem;
    width: 1.7rem; height: 1.7rem; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .conf {
    position: absolute; top: .55rem; right: .55rem;
    font-size: .68rem; padding: .1rem .5rem; border-radius: 99px;
    background: rgba(0,0,0,.55); color: var(--dim); border: 1px solid var(--border);
  }
  .body { padding: .9rem 1rem 1.1rem; display: flex; flex-direction: column; gap: .35rem; flex: 1; }
  .name { font-size: 1rem; font-weight: 700; line-height: 1.4; }
  .jp { font-size: .8rem; color: var(--dim); }
  .row { margin-top: .4rem; display: flex; flex-wrap: wrap; gap: .4rem; }
  .pill {
    font-size: .74rem; padding: .12rem .55rem; border-radius: 99px;
    background: var(--pill); color: var(--accent); border: 1px solid var(--pill-border);
  }
  .pill.loc { background: rgba(76,194,255,.12); color: var(--accent2); border-color: rgba(76,194,255,.35); }
  .note { font-size: .8rem; color: var(--muted); margin-top: .3rem; }
  footer { text-align: center; margin-top: 3rem; color: var(--dim); font-size: .78rem; }
  footer a { color: var(--accent2); text-decoration: none; }
</style>
</head>
<body>
<main>
  <header>
    <h1><span class="bolt">⚡</span> 皮卡丘限定收藏圖鑑</h1>
    <p>Derek 的日本限定皮卡丘娃娃 · 每一隻的限定地點與活動 · 共 12 款</p>
  </header>
  <div class="grid" id="grid"></div>
  <footer>
    地點/年份由以圖搜圖+官方資料查證,標「推測」者信心較低待實物吊牌確認 ·
    <a href="../">← guides</a>
  </footer>
</main>
<script>
const items = [
 {img:"01-30th.jpg", name:"寶可夢 30 週年紀念 皮卡丘", jp:"ピカピカ！ピカチュウ", loc:"寶可夢中心全店＋線上", year:"2026", conf:"高",
  note:"奶油金絨毛、抱繡「30th」金色寶貝球。慶祝寶可夢 30 週年的紀念款。"},
 {img:"02-valentine.jpg", name:"情人節 巧克力皮卡丘", jp:"バレンタイン（Morozoff 聯名系列）", loc:"寶可夢中心全店＋線上", year:"約 2024", conf:"中",
  note:"棕色調、愛心圍裙、抱酒紅緞面愛心。情人節巧克力聯名系列;確切年份建議看吊牌。"},
 {img:"03-kyoto.jpg", name:"舞妓皮卡丘（京都）", jp:"舞妓はんピカチュウ", loc:"寶可夢中心 京都限定", year:"2016", conf:"中高",
  note:"紅振袖和服＋花簪＋緋毛氈台。京都店開店紀念的招牌款。"},
 {img:"04-okinawa-ryubu.jpg", name:"琉球舞踊皮卡丘（沖繩）", jp:"琉舞ピカチュウ", loc:"寶可夢 沖繩限定", year:"2017 / 2022 再版", conf:"高",
  note:"琉球紅型衣裝＋花笠。沖繩店開店紀念,2022 沖繩中心開幕再版。"},
 {img:"05-okinawa-eisa.jpg", name:"EISA 太鼓皮卡丘（沖繩）", jp:"エイサーピカチュウ", loc:"寶可夢中心 沖繩限定", year:"2022", conf:"高",
  note:"紅頭巾＋棒槌＋パーランクー小太鼓。沖繩傳統太鼓舞 Eisa,沖繩中心開幕紀念。"},
 {img:"06-matsuri.jpg", name:"夏祭皮卡丘（推測）", jp:"おまつりピカチュウ 系列", loc:"寶可夢中心全店（待確認）", year:"約 2016", conf:"低",
  note:"法被＋額頭祭典面具＋鳴子拍板。最接近夏祭系列,但鳴子細節官方無對應紀錄——建議拿吊牌再確認。"},
 {img:"07-ramen.jpg", name:"拉麵皮卡丘（福岡）", jp:"ラーメンピカチュウ（一風堂聯名）", loc:"寶可夢中心 福岡限定", year:"2025", conf:"高",
  note:"頭巾＋捧大拉麵碗（雷紋碗緣）。福岡中心 × 一風堂聯名,遷移重裝紀念。"},
 {img:"08-cts-pair.jpg", name:"新千歲機場 地勤＋機長（一對）", jp:"パイロット／CA ピカチュウ（CTS）", loc:"寶可夢 新千歲機場店限定", year:"CTS 徽章版", conf:"中高",
  note:"胸前「CTS」徽章。北海道新千歲機場店限定,一隻地勤一隻機長。"},
 {img:"09-ngo-pilot.jpg", name:"中部機場 機長皮卡丘", jp:"パイロットピカチュウ セントレア", loc:"寶可夢 中部國際機場店（已絕版）", year:"2016", conf:"高",
  note:"雙排金釦機長外套印「NGO」＋機長帽。名古屋中部機場店限定,店已於 2021 閉店,絕版。"},
 {img:"10-ngo-ca.jpg", name:"中部機場 空服皮卡丘", jp:"CA ピカチュウ セントレア", loc:"寶可夢 中部國際機場店（已絕版）", year:"2016", conf:"高",
  note:"空服制服印「NGO」＋粉紅條紋大蝴蝶結＋側背包。與機長款成對,同樣已絕版。"},
 {img:"11-cafe-chef.jpg", name:"主廚皮卡丘（Pokémon Cafe）", jp:"シェフピカチュウ", loc:"Pokémon Cafe 限定（東京日本橋／大阪）", year:"約 2018", conf:"高",
  note:"主廚服＋高帽＋托盤上一隻迷你皮卡丘。寶可夢咖啡廳開幕系列。"},
 {img:"12-cafe-waitress.jpg", name:"店員皮卡丘（Pokémon Cafe）", jp:"ウェイトレスピカチュウ", loc:"Pokémon Cafe 限定", year:"待確認", conf:"中",
  note:"紅船形帽＋紅白條紋＋寶貝球圍裙,咖啡廳店員制服款。"},
];
const grid = document.getElementById("grid");
items.forEach((it, i) => {
  const c = document.createElement("div");
  c.className = "card";
  c.innerHTML = `
    <div class="photo">
      <img src="img/${it.img}" alt="${it.name}" loading="lazy">
      <div class="num">${i+1}</div>
      <div class="conf">信心 ${it.conf}</div>
    </div>
    <div class="body">
      <div class="name">${it.name}</div>
      <div class="jp">${it.jp}</div>
      <div class="row"><span class="pill loc">📍 ${it.loc}</span><span class="pill">🗓 ${it.year}</span></div>
      <div class="note">${it.note}</div>
    </div>`;
  grid.appendChild(c);
});
</script>
</body>
</html>
